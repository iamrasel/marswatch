<!DOCTYPE html>
<html>
<head>
    <title>MarsWatch</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table class="main-table">
        <tr>
            <td class="parent-cell">
                <button id="theme-toggle" onclick="toggleTheme()">☀️</button>

                <div id="parent-time">00:00:00.00</div>

                <div class="button-container">
                    <button id="reset-button" onclick="resetAll()">Reset</button>
                    <button id="pause-button" onclick="pauseAll()">Pause</button>
                </div>

                <div class="data-button-container">
                    <button id="copy-button" onclick="copyData()" title="Copy JSON data, paste this to your new session to continue.">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-buttons" viewBox="0 -960 960 960"><path d="M362.31-260Q332-260 311-281q-21-21-21-51.31v-455.38Q290-818 311-839q21-21 51.31-21h335.38Q728-860 749-839q21 21 21 51.31v455.38Q770-302 749-281q-21 21-51.31 21H362.31Zm0-60h335.38q4.62 0 8.46-3.85 3.85-3.84 3.85-8.46v-455.38q0-4.62-3.85-8.46-3.84-3.85-8.46-3.85H362.31q-4.62 0-8.46 3.85-3.85 3.84-3.85 8.46v455.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85Zm-140 200Q192-120 171-141q-21-21-21-51.31v-515.38h60v515.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85h395.38v60H222.31ZM350-320v-480 480Z"/></svg>
                    </button>
                    <button id="paste-button" onclick="pasteData()" title="Paste previously copied JSON data to continue where you left off.">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-buttons" viewBox="0 -960 960 960"><path d="M212.31-140q-29.92 0-51.12-21.19Q140-182.39 140-212.31v-535.38q0-29.92 21.19-51.12Q182.39-820 212.31-820h176.23q8.31-29.23 33.96-48.46t57.5-19.23q33.08 0 58.42 19.23 25.35 19.23 33.66 48.46h175.61q29.92 0 51.12 21.19Q820-777.61 820-747.69v535.38q0 29.92-21.19 51.12Q777.61-140 747.69-140H212.31Zm0-60h535.38q4.62 0 8.46-3.85 3.85-3.84 3.85-8.46v-535.38q0-4.62-3.85-8.46-3.84-3.85-8.46-3.85H660v104.61H300V-760h-87.69q-4.62 0-8.46 3.85-3.85 3.84-3.85 8.46v535.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85Zm293.5-565.73q10.34-10.35 10.34-25.81 0-15.46-10.34-25.81-10.35-10.34-25.81-10.34-15.46 0-25.81 10.34-10.34 10.35-10.34 25.81 0 15.46 10.34 25.81 10.35 10.35 25.81 10.35 15.46 0 25.81-10.35Z"/></svg>
                    </button>
                </div>
            </td>

            <td class="children-cell">
                <table class="grid-table">
                    <tr>
                        <td>
                            <div id="card-0" class="child-card group-a">
                                <div class="child-label">L1 US LB</div>
                                <div id="time-0" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-1" class="child-card group-b">
                                <div class="child-label">L2 EU LF</div>
                                <div id="time-1" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-2" class="child-card group-b">
                                <div class="child-label">L2 EU LB</div>
                                <div id="time-2" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div id="card-3" class="child-card group-a">
                                <div class="child-label">L1 US LF</div>
                                <div id="time-3" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-4" class="child-card group-break">
                                <div class="child-label">OTHER</div>
                                <div id="time-4" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-5" class="child-card group-b">
                                <div class="child-label">L2 US LF</div>
                                <div id="time-5" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div id="card-6" class="child-card group-a">
                                <div class="child-label">L1 EU LB</div>
                                <div id="time-6" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-7" class="child-card group-a">
                                <div class="child-label">L1 EU LF</div>
                                <div id="time-7" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                        <td>
                            <div id="card-8" class="child-card group-b">
                                <div class="child-label">L2 US LB</div>
                                <div id="time-8" class="time-display">00:00:00.00</div>
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <script src="script.js"></script>
</body>
</html>
